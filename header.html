<!-- KBDI Global Header — https://edukbdi.github.io/header.html -->
<style>
  /* ── KBDI HEADER GLOBAL ── */
  #kbdi-header {
    position: sticky;
    top: 0;
    z-index: 9999;
    padding: 0 clamp(1.5rem, 5vw, 5rem);
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 68px;
    font-family: 'DM Sans', 'Segoe UI', sans-serif;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    background: rgba(13, 15, 20, 0.92);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    transition: background 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
    box-sizing: border-box;
  }

  #kbdi-header.kbdi-scrolled {
    box-shadow: 0 4px 28px rgba(0,0,0,0.35);
  }

  /* ── LIGHT MODE ── */
  #kbdi-header.kbdi-light {
    background: rgba(245, 242, 236, 0.95);
    border-bottom: 1px solid rgba(0,0,0,0.1);
  }

  #kbdi-header.kbdi-light.kbdi-scrolled {
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  }

  /* ── LOGO ── */
  #kbdi-header .kbdi-logo {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    text-decoration: none;
  }

  #kbdi-header .kbdi-logo-img {
    height: 38px;
    width: auto;
  }

  #kbdi-header .kbdi-logo-text {
    display: flex;
    flex-direction: column;
    gap: 0.05rem;
  }

  #kbdi-header .kbdi-logo-name {
    font-family: 'Bebas Neue', 'Impact', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.08em;
    color: #e87722;
    line-height: 1;
    text-decoration: none;
  }

  #kbdi-header .kbdi-logo-tagline {
    font-size: 0.62rem;
    color: #7a7f8e;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    line-height: 1;
  }

  #kbdi-header.kbdi-light .kbdi-logo-tagline {
    color: #888;
  }

  /* ── KANAN HEADER ── */
  #kbdi-header .kbdi-header-right {
    display: flex;
    align-items: center;
    gap: 1.2rem;
  }

  /* ── HOME LINK ── */
  #kbdi-header .kbdi-home-link {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: #7a7f8e;
    text-decoration: none;
    transition: color 0.2s;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  #kbdi-header .kbdi-home-link:hover {
    color: #e87722;
  }

  #kbdi-header.kbdi-light .kbdi-home-link {
    color: #888;
  }

  #kbdi-header.kbdi-light .kbdi-home-link:hover {
    color: #d06010;
  }

  /* ── THEME TOGGLE ── */
  #kbdi-header .kbdi-toggle {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 2rem;
    width: 52px;
    height: 28px;
    cursor: pointer;
    position: relative;
    transition: background 0.3s, border 0.3s;
    flex-shrink: 0;
    padding: 0;
  }

  #kbdi-header.kbdi-light .kbdi-toggle {
    background: rgba(0,0,0,0.07);
    border: 1px solid rgba(0,0,0,0.15);
  }

  #kbdi-header .kbdi-toggle::before {
    content: '';
    position: absolute;
    top: 4px;
    left: 4px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #e87722;
    transition: transform 0.3s ease;
  }

  #kbdi-header.kbdi-light .kbdi-toggle::before {
    transform: translateX(24px);
  }

  #kbdi-header .kbdi-toggle-icon {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.65rem;
    pointer-events: none;
    line-height: 1;
  }

  #kbdi-header .kbdi-icon-moon { left: 6px; }
  #kbdi-header .kbdi-icon-sun  { right: 5px; }

  /* ── GOOGLE FONTS (jika belum dimuat artikel) ── */
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap');
</style>

<header id="kbdi-header">
  <a href="https://edukbdi.github.io/" class="kbdi-logo">
    <img src="https://edukbdi.github.io/kbdi_trans.png" alt="Logo KBDI" class="kbdi-logo-img">
    <div class="kbdi-logo-text">
      <span class="kbdi-logo-name">KBDI</span>
      <span class="kbdi-logo-tagline">Komunitas Belajar Daring Indonesia</span>
    </div>
  </a>
  <div class="kbdi-header-right">
    <a href="https://edukbdi.github.io/" class="kbdi-home-link">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Beranda
    </a>
    <button class="kbdi-toggle" id="kbdiThemeToggle" title="Ganti tema">
      <span class="kbdi-toggle-icon kbdi-icon-moon">🌙</span>
      <span class="kbdi-toggle-icon kbdi-icon-sun">☀️</span>
    </button>
  </div>
</header>

<script>
  (function() {
    var header = document.getElementById('kbdi-header');

    // Terapkan tema tersimpan
    var saved = localStorage.getItem('kbdi-theme');
    if (saved === 'light') header.classList.add('kbdi-light');

    // Shadow saat scroll
    window.addEventListener('scroll', function() {
      header.classList.toggle('kbdi-scrolled', window.scrollY > 10);
    });

    // Toggle dark/light
    document.getElementById('kbdiThemeToggle').addEventListener('click', function() {
      header.classList.toggle('kbdi-light');
      var isLight = header.classList.contains('kbdi-light');
      localStorage.setItem('kbdi-theme', isLight ? 'light' : 'dark');

      // Sinkronisasi dengan html.light jika artikel mendukungnya
      document.documentElement.classList.toggle('light', isLight);
    });
  })();
</script>
